name: Publish CLI

on:
  push:
    branches:
      - main
    paths:
      - "packages/cli/**"
      - "skills/instagram-insights/**"
      - ".plugin/**"
      - ".claude-plugin/**"
      - "scripts/set-cli-version.mjs"
      - "scripts/generate-cli-update-manifest.mjs"
      - ".github/workflows/publish-cli.yml"
      - "package.json"
      - "yarn.lock"
  workflow_dispatch:
    inputs:
      notes:
        description: Release notes shown by the updater
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    runs-on: macos-14
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      RELEASES_BASE_URL: ${{ vars.INSTAGRAM_INSIGHTS_CLI_RELEASES_BASE_URL }}
      RELEASES_BUCKET: ${{ vars.INSTAGRAM_INSIGHTS_CLI_RELEASES_BUCKET }}
      RELEASES_PREFIX: ${{ vars.INSTAGRAM_INSIGHTS_CLI_RELEASES_PREFIX || 'cli' }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.INSTAGRAM_INSIGHTS_CLI_AWS_ROLE_ARN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Derive next CLI version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node -p "require('./packages/cli/package.json').version")
          export CURRENT_VERSION
          export MANIFEST_URL="${RELEASES_BASE_URL%/}/${RELEASES_PREFIX}/latest.json"
          NEXT_VERSION=$(node <<'NODE'
          const endpoint = process.env.MANIFEST_URL;
          const fallbackVersion = process.env.CURRENT_VERSION;

          function incrementPatch(version) {
            const parts = version.split(".").map((value) => Number.parseInt(value, 10));
            if (parts.length !== 3 || parts.some((value) => Number.isNaN(value))) {
              throw new Error(`Unsupported semver version: ${version}`);
            }

            parts[2] += 1;
            return parts.join(".");
          }

          async function main() {
            if (!endpoint) {
              console.log(incrementPatch(fallbackVersion));
              return;
            }

            try {
              const response = await fetch(endpoint, { headers: { Accept: "application/json" } });
              if (!response.ok) {
                console.log(incrementPatch(fallbackVersion));
                return;
              }

              const payload = await response.json();
              if (typeof payload?.version !== "string" || payload.version.length === 0) {
                console.log(incrementPatch(fallbackVersion));
                return;
              }

              console.log(incrementPatch(payload.version));
            } catch {
              console.log(incrementPatch(fallbackVersion));
            }
          }

          await main();
          NODE
          )

          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "manifest_url=${MANIFEST_URL}" >> "$GITHUB_OUTPUT"

      - name: Stamp CLI version
        run: node ./scripts/set-cli-version.mjs --version "${{ steps.version.outputs.next }}"

      - name: Run CLI tests
        run: |
          yarn build:cli
          yarn workspace @instagram-insights/cli typecheck
          yarn workspace @instagram-insights/cli test

      - name: Import Apple Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail

          CERT_PATH="${RUNNER_TEMP}/developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          printf '%s' "${APPLE_CERTIFICATE}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          SIGNING_IDENTITY=$(
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
              | grep "Developer ID Application" \
              | head -n 1 \
              | awk -F '"' '{ print $2 }'
          )

          if [[ -z "${SIGNING_IDENTITY}" ]]; then
            echo "Could not find a Developer ID Application signing identity in the temporary keychain." >&2
            exit 1
          fi

          echo "INSTAGRAM_INSIGHTS_APPLE_SIGNING_IDENTITY=${SIGNING_IDENTITY}" >> "${GITHUB_ENV}"

      - name: Prepare App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail

          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_CONTENT}" > "${API_KEY_PATH}"
          chmod 600 "${API_KEY_PATH}"

          echo "APPLE_API_KEY_PATH=${API_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Build signed macOS CLI binaries
        run: yarn package:cli:macos

      - name: Verify signed macOS CLI binaries
        shell: bash
        run: |
          set -euo pipefail

          CLI_BIN="packages/cli/dist/macos-arm64/bin/instagram-insights"
          UPDATER_BIN="packages/cli/dist/macos-arm64/bin/instagram-insights-updater"

          codesign --verify --verbose=2 "${CLI_BIN}"
          codesign --verify --verbose=2 "${UPDATER_BIN}"
          spctl --assess --type execute --verbose=4 "${CLI_BIN}"
          spctl --assess --type execute --verbose=4 "${UPDATER_BIN}"

      - name: Create notarized manual archive
        shell: bash
        run: |
          set -euo pipefail

          MANUAL_ROOT="packages/cli/dist/macos-arm64/manual"
          ZIP_PATH="packages/cli/dist/macos-arm64/instagram-insights-macos-arm64.zip"

          rm -f "${ZIP_PATH}"
          ditto -c -k --keepParent "${MANUAL_ROOT}/instagram-insights" "${ZIP_PATH}"

          xcrun notarytool submit "${ZIP_PATH}" \
            --key "${APPLE_API_KEY_PATH}" \
            --key-id "${APPLE_API_KEY}" \
            --issuer "${APPLE_API_ISSUER}" \
            --wait

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail

          node ./scripts/generate-cli-update-manifest.mjs \
            --version "${{ steps.version.outputs.next }}" \
            --base-url "${RELEASES_BASE_URL%/}/${RELEASES_PREFIX}" \
            --artifact-root "packages/cli/dist/macos-arm64/bin" \
            --output "./latest.json" \
            --notes "${{ github.event.inputs.notes }}" \
            --published-at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Upload CLI artifacts to S3
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.next }}"
          VERSION_PREFIX="${RELEASES_PREFIX}/${VERSION}"

          upload_file() {
            local source_path="$1"
            local relative_path="$2"
            local content_type="$3"
            aws s3 cp "${source_path}" "s3://${RELEASES_BUCKET}/${VERSION_PREFIX}/${relative_path}" \
              --content-type "${content_type}" \
              --cache-control "public, max-age=31536000, immutable"
          }

          upload_file "packages/cli/dist/macos-arm64/bin/instagram-insights" "bin/instagram-insights" "application/octet-stream"
          upload_file "packages/cli/dist/macos-arm64/bin/instagram-insights-updater" "bin/instagram-insights-updater" "application/octet-stream"
          upload_file "packages/cli/dist/macos-arm64/bin/instagram-insights.version.json" "bin/instagram-insights.version.json" "application/json; charset=utf-8"
          upload_file "packages/cli/dist/macos-arm64/instagram-insights-macos-arm64.zip" "manual/instagram-insights-macos-arm64.zip" "application/zip"

          aws s3 cp "./latest.json" "s3://${RELEASES_BUCKET}/${RELEASES_PREFIX}/latest.json" \
            --content-type "application/json; charset=utf-8" \
            --cache-control "no-store, no-cache, max-age=0, must-revalidate"

          echo "Published CLI version: ${VERSION}"
          echo "CLI manifest: ${RELEASES_BASE_URL%/}/${RELEASES_PREFIX}/latest.json"
