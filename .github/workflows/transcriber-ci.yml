name: Transcriber CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CDK_DEFAULT_ACCOUNT: "111111111111"
      CDK_DEFAULT_REGION: us-east-1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck CLI
        run: yarn workspace @instagram-insights/cli typecheck

      - name: Run CLI tests
        run: yarn workspace @instagram-insights/cli test

      - name: Install transcriber dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<81" wheel
          pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.6.0"
          pip install --no-build-isolation -r services/transcriber/requirements.txt -r services/transcriber/requirements-dev.txt

      - name: Lint web app
        run: yarn workspace @instagram-insights/web lint

      - name: Typecheck web app
        run: yarn workspace @instagram-insights/web typecheck

      - name: Run web tests
        run: yarn workspace @instagram-insights/web test

      - name: Run transcriber tests
        run: python -m pytest services/transcriber/tests

      - name: Synthesize CDK stacks
        run: yarn workspace @instagram-insights/infra synth --context transcriberApiKey=dummy-ci-key

      - name: Build transcriber image
        run: docker build -f services/transcriber/Dockerfile .
