name: Deploy Transcriber

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_OUTPUTS_FILE: ${{ github.workspace }}/cdk-outputs.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace dependencies
        run: yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy bootstrap stack
        run: |
          yarn workspace @instagram-insights/infra cdk deploy \
            --require-approval never \
            --outputs-file "${CDK_OUTPUTS_FILE}" \
            InstagramInsightsTranscriberBootstrap

      - name: Read ECR repository URI
        id: bootstrap
        run: |
          python - <<'PY'
          import json
          import os

          with open(os.environ["CDK_OUTPUTS_FILE"], "r", encoding="utf-8") as handle:
              outputs = json.load(handle)

          repository_uri = outputs["InstagramInsightsTranscriberBootstrap"]["RepositoryUri"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"repository_uri={repository_uri}\n")
          PY

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push transcriber image
        env:
          REPOSITORY_URI: ${{ steps.bootstrap.outputs.repository_uri }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f services/transcriber/Dockerfile -t "${REPOSITORY_URI}:${IMAGE_TAG}" .
          docker push "${REPOSITORY_URI}:${IMAGE_TAG}"

      - name: Deploy service stack
        env:
          IMAGE_TAG: ${{ github.sha }}
          TRANSCRIBER_API_KEY: ${{ secrets.TRANSCRIBER_API_KEY }}
        run: |
          yarn workspace @instagram-insights/infra cdk deploy \
            --require-approval never \
            --outputs-file "${CDK_OUTPUTS_FILE}" \
            --context imageTag="${IMAGE_TAG}" \
            --context transcriberApiKey="${TRANSCRIBER_API_KEY}" \
            InstagramInsightsTranscriberService

      - name: Read API endpoint
        id: service
        run: |
          python - <<'PY'
          import json
          import os

          with open(os.environ["CDK_OUTPUTS_FILE"], "r", encoding="utf-8") as handle:
              outputs = json.load(handle)

          api_base_url = outputs["InstagramInsightsTranscriberService"]["ApiBaseUrl"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"api_base_url={api_base_url}\n")
          PY

      - name: Smoke test health endpoint
        run: curl --fail --silent --show-error "${{ steps.service.outputs.api_base_url }}/health"
